<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohub | 你的匿名心事港湾</title>

<style>
:root {
    --primary-bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-light: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #38bdf8;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background: var(--primary-bg);
    color: var(--text-light);
    min-height: 100vh;
    padding: 3rem 1.5rem;
}

.container {
    max-width: 800px;
    margin: 0 auto;
}

header {
    text-align: center;
    margin-bottom: 4rem;
}

header h1 {
    font-size: 2.8rem;
    font-weight: 300;
}

header p {
    color: var(--text-muted);
}

.publish-box {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 4rem;
}

input, textarea {
    width: 100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 1rem;
    color: var(--text-light);
    margin-bottom: 1rem;
}

textarea {
    min-height: 100px;
}

button {
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

.message-board {
    display: grid;
    gap: 1rem;
}

.message-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 1rem;
}

.message-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
}

.loading {
    text-align: center;
    color: var(--text-muted);
}
</style>
</head>

<body>

<div class="container">

<header>
    <h1>Mohub.online</h1>
    <p>匿名树洞</p>
</header>

<div class="publish-box">
    <input id="authorInput" placeholder="你的代号（可选）">
    <textarea id="contentInput" placeholder="写下你的心事"></textarea>
    <button id="submitBtn">发送</button>
</div>

<div class="message-board" id="messageBoard">
    <div class="loading">加载中...</div>
</div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
    'https://ovfwarzvmdynmysdagmy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92Zndhcnp2bWR5bm15c2RhZ215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTQ5NzQsImV4cCI6MjA5MTczMDk3NH0.ZzAec-6TcRIOxfviuWSx8rdwR8S_8YeoeD_L7IWt0Gs'
);

const TABLE = 'hold';

const board = document.getElementById('messageBoard');
const btn = document.getElementById('submitBtn');
const authorInput = document.getElementById('authorInput');
const contentInput = document.getElementById('contentInput');

async function load() {
    const { data, error } = await client
        .from(TABLE)
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        board.innerHTML = error.message;
        return;
    }

    board.innerHTML = '';

    if (!data.length) {
        board.innerHTML = '<div class="loading">暂无内容</div>';
        return;
    }

    data.forEach(i => board.appendChild(card(i)));
}

async function send() {
    const author = authorInput.value.trim() || '匿名';
    const content = contentInput.value.trim();

    if (!content) return alert('不能为空');

    btn.disabled = true;

    const { data, error } = await client
        .from(TABLE)
        .insert([{ author, content }])
        .select();

    btn.disabled = false;

    if (error) return alert(error.message);

    contentInput.value = '';
    board.prepend(card(data[0]));
}

function card(i) {
    const div = document.createElement('div');
    div.className = 'message-card';

    div.innerHTML = `
        <div>${i.content}</div>
        <div class="message-footer">
            <span>${i.author}</span>
            <span>${new Date(i.created_at).toLocaleString()}</span>
        </div>
    `;
    return div;
}

btn.onclick = send;
load();
</script>

</body>
</html>
